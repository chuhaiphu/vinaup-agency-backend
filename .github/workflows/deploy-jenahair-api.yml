name: Deploy Jenahair API to VPS

on:
  push:
    tags:
      - 'jenahair-api/v*.*.*' # Only active with prefix jenahair-api/

env:
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}
  DOCKER_CONTAINER_NAME: jenahair-api
  DEPLOY_DIR: /opt/apps/jenahair.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: jenahair-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # Strip 'jenahair-api/' to get version number
          TAG_NAME=${{ github.ref_name }}
          echo "VERSION=${TAG_NAME#*/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/jenahair-api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@${{ secrets.VPS_HOST }}:5432/${{ secrets.POSTGRES_DB }}?schema=public

      - name: Deploy to VPS via Docker Compose
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd ${{ env.DEPLOY_DIR }}

            # Export env vars consumed by docker-compose.yml
            export DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}"
            export VERSION="${{ steps.version.outputs.VERSION }}"
            export DOCKER_CONTAINER_NAME="${{ env.DOCKER_CONTAINER_NAME }}"
            export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export RECAPTCHA_PROJECT_ID="${{ secrets.RECAPTCHA_PROJECT_ID }}"
            export RECAPTCHA_SITE_KEY="${{ secrets.RECAPTCHA_SITE_KEY }}"
            export UPLOAD_PATH="/app/public/media"
            export ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}"
            export ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
            export ADMIN_NAME="${{ secrets.ADMIN_NAME }}"
            export SUPADMIN_EMAIL="${{ secrets.SUPADMIN_EMAIL }}"
            export SUPADMIN_PASSWORD="${{ secrets.SUPADMIN_PASSWORD }}"
            export SUPADMIN_NAME="${{ secrets.SUPADMIN_NAME }}"

            # Pull, recreate, and start
            docker compose pull
            docker compose down
            docker compose up -d

            # Keep only the latest 3 image tags
            docker images ${{ env.DOCKER_IMAGE }} --format "table {{.Tag}}\t{{.ID}}" \
              | tail -n +4 | awk '{print $2}' | xargs -r docker rmi || true

            docker compose ps
